name: Collect Publication Abstracts

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collect-publication-abstracts
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate collector
        run: |
          python -m py_compile scripts/collect_publication_abstracts.py

      - name: Collect abstract candidates
        env:
          CROSSREF_MAILTO: zhanwang@zjenergy.com.cn
          METADATA_USER_AGENT: "wangzhan0415.github.io abstract collector (mailto:zhanwang@zjenergy.com.cn)"
        run: |
          python scripts/collect_publication_abstracts.py \
            --publication-dir content/publication \
            --output-dir abstract-review \
            --delay-seconds 1.5 \
            --include-publisher-pages

      - name: Verify publications were not modified
        run: |
          git diff --exit-code -- content/publication

      - name: Verify candidate files
        run: |
          test -s abstract-review/abstract_candidates_review.csv
          test -s abstract-review/abstract_candidates.json
          test -s abstract-review/summary.md
          test -s abstract-review/failed_records.csv

      - name: Upload abstract review
        uses: actions/upload-artifact@v4
        with:
          name: publication-abstract-review
          path: abstract-review/
          if-no-files-found: error
          retention-days: 14
